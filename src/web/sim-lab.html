<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flood Sandbox Lab</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07111f;
      color: #dbeafe;
    }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 20% 10%, #12345d, #07111f 48%, #030712);
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      height: 100vh;
      padding: 14px;
    }
    .stage, aside {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.78);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
    }
    .stage {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    #sim-canvas {
      width: 100%;
      height: 100%;
      image-rendering: auto;
      background: #0f172a;
    }
    .badge {
      position: absolute;
      left: 16px;
      top: 16px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.74);
      color: #bfdbfe;
      font-size: 13px;
      letter-spacing: 0.02em;
    }
    aside {
      padding: 18px;
      overflow: auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      color: #f8fafc;
    }
    p {
      margin: 0 0 18px;
      color: #93c5fd;
      line-height: 1.45;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      color: #cbd5e1;
      font-weight: 700;
      font-size: 13px;
    }
    select, button {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 8px;
      background: #0f172a;
      color: #e0f2fe;
      padding: 10px 12px;
      font: inherit;
    }
    button {
      margin-top: 10px;
      cursor: pointer;
      font-weight: 800;
      background: #2563eb;
      border-color: #3b82f6;
    }
    button.secondary {
      background: #172554;
    }
    #status {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(14, 165, 233, 0.12);
      color: #bae6fd;
      font-weight: 800;
      font-size: 13px;
    }
    pre {
      margin: 12px 0 0;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      max-height: 44vh;
      background: #020617;
      color: #d1fae5;
      font-size: 11px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <section class="stage">
      <canvas id="sim-canvas" width="960" height="720" aria-label="Flood simulation lab canvas"></canvas>
      <div class="badge">Flood Sandbox Lab · WebGPU/CPU QA Harness</div>
    </section>
    <aside>
      <h1>Flood Sandbox Lab</h1>
      <p>Dev-only simulation harness for deterministic shallow-water scenarios. Agents use this page for screenshots, metrics, and pass/fail evidence before product UI changes.</p>
      <label for="scenario-select">Scenario</label>
      <select id="scenario-select"></select>
      <label for="backend-select">Backend</label>
      <select id="backend-select">
        <option value="auto">Auto: WebGPU if available</option>
        <option value="webgpu">WebGPU</option>
        <option value="cpu">CPU reference</option>
      </select>
      <button id="run-button" type="button">Run Scenario</button>
      <button id="step-button" class="secondary" type="button">Step Once</button>
      <button id="reset-button" class="secondary" type="button">Reset</button>
      <div id="status">BOOTING</div>
      <pre id="metrics">{}</pre>
    </aside>
  </main>
  <script src="/static/js/flood-sim-core.js"></script>
  <script src="/static/js/flood-sim-webgpu.js"></script>
  <script src="/static/js/flood-sim-lab.js"></script>
</body>
</html>
