<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FloodMap 3D</title>
  <link rel="stylesheet" href="static/vendor/maplibre-gl-4.7.1.css?v=__FLOODMAP_ASSET_VERSION__">
  <link rel="stylesheet" href="static/css/terrain-3d.css?v=__FLOODMAP_ASSET_VERSION__">
</head>
<body>
  <main class="stage">
    <canvas id="terrain-3d-canvas" aria-label="3D flood terrain canvas"></canvas>
    <header class="topbar">
      <div class="brand">
        <h1>FloodMap 3D</h1>
        <p>Real streets, real terrain, and animated water across the map.</p>
      </div>
      <form id="terrain-place-search" class="place-search" role="search">
        <input id="terrain-place-query" type="search" placeholder="Search city or ZIP" autocomplete="off">
        <button type="submit">Go</button>
      </form>
      <div class="topbar-actions">
        <a id="terrain-2d-link" class="map-link" href="/">2D Map</a>
        <div id="terrain-status" class="status">Loading</div>
      </div>
    </header>
    <section class="controls" aria-label="3D terrain controls">
      <label for="water-level">
        <span>Floodwater</span>
        <span id="water-readout">22.0m</span>
      </label>
      <input id="water-level" type="range" min="0" max="1000" step="1" value="22">
      <div class="readout"><span>creeks</span><span>everywhere</span></div>

      <div class="button-row">
        <button type="button" data-water-preset="8">Fill creeks</button>
        <button type="button" data-water-preset="35">Big flood</button>
        <button type="button" id="play-flood">Play flood</button>
        <button type="button" id="reset-camera">Reset view</button>
      </div>
      <div class="nav-row" aria-label="Move across the map">
        <button type="button" data-pan-tile="west">West</button>
        <button type="button" data-pan-tile="north">North</button>
        <button type="button" data-pan-tile="east">East</button>
        <button type="button" data-pan-tile="south">South</button>
      </div>
    </section>
    <section class="debug-panel" aria-label="3D debug stats">
      <pre id="terrain-stats">{}</pre>
    </section>
    <div id="basemap-capture"></div>
  </main>
  <script>
    (() => {
      document.documentElement.dataset.debug = new URLSearchParams(location.search).get("debug") === "1"
        ? "true"
        : "false";
      window.FLOODMAP_ASSET_VERSION = "__FLOODMAP_ASSET_VERSION__";
      window.FLOODMAP_PUBLIC_BASE_PATH = (function determineFloodmapPublicBasePath() {
        const pathname = window.location.pathname || "/";
        return pathname === "/floodmap" || pathname.startsWith("/floodmap/") ? "/floodmap" : "";
      })();
      function normalizeFloodmapPath(path) {
        if (typeof path !== "string" || !path.trim()) {
          throw new TypeError("Floodmap path helpers require a non-empty string path.");
        }
        return path.startsWith("/") ? path : `/${path}`;
      }
      window.floodmapPublicUrl = (path) => `${window.FLOODMAP_PUBLIC_BASE_PATH}${normalizeFloodmapPath(path)}`;
      window.floodmapApiUrl = (path) => {
        const normalizedPath = normalizeFloodmapPath(path);
        const apiPath = normalizedPath === "/api" || normalizedPath.startsWith("/api/")
          ? normalizedPath
          : `/api${normalizedPath}`;
        return window.floodmapPublicUrl(apiPath);
      };
      window.floodmapAssetUrl = (path) => {
        const normalizedPath = normalizeFloodmapPath(path);
        const staticPath = normalizedPath === "/static" || normalizedPath.startsWith("/static/")
          ? normalizedPath
          : `/static${normalizedPath}`;
        const url = new URL(window.floodmapPublicUrl(staticPath), window.location.origin);
        if (window.FLOODMAP_ASSET_VERSION) url.searchParams.set("v", window.FLOODMAP_ASSET_VERSION);
        return url.toString();
      };
      window.FLOODMAP_TILE_VERSION = window.FLOODMAP_ASSET_VERSION;
    })();
  </script>
  <script src="static/vendor/maplibre-gl-csp-4.7.1.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script>
    maplibregl.setWorkerUrl(window.floodmapAssetUrl("/vendor/maplibre-gl-csp-worker-4.7.1.js"));
  </script>
  <script src="static/js/elevation-renderer.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/flood-sim-core.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-math.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-world.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-flood-player.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-shaders.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-basemap.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-mesh.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d.js?v=__FLOODMAP_ASSET_VERSION__"></script>
</body>
</html>
