<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FloodMap 3D</title>
  <link rel="stylesheet" href="static/vendor/maplibre-gl-4.7.1.css?v=__FLOODMAP_ASSET_VERSION__">
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05070d;
      color: #e5edf8;
    }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 25% 10%, rgba(37, 99, 235, 0.24), transparent 32%),
        linear-gradient(180deg, #06111f 0%, #030711 58%, #02040a 100%);
    }
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #020617;
    }
    #terrain-3d-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    #terrain-3d-canvas:active {
      cursor: grabbing;
    }
    .topbar,
    .controls,
    .debug-panel {
      position: absolute;
      z-index: 2;
      backdrop-filter: blur(18px);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.30);
    }
    .topbar {
      left: 24px;
      right: 24px;
      top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(2, 6, 23, 0.56);
      pointer-events: none;
    }
    .brand {
      min-width: 0;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 5px 0 0;
      color: #c2cbd9;
      line-height: 1.3;
      font-size: 13px;
    }
    .status {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(14, 165, 233, 0.16);
      color: #bfdbfe;
      font-size: 12px;
      font-weight: 800;
    }
    .controls {
      right: 24px;
      bottom: 24px;
      width: min(360px, calc(100vw - 48px));
      border-radius: 12px;
      background: rgba(5, 10, 20, 0.72);
      padding: 16px;
    }
    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 8px;
      color: #d8e2f1;
      font-weight: 800;
      font-size: 13px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #60a5fa;
    }
    .readout {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 16px;
      color: #93c5fd;
      font-weight: 800;
    }
    .button-row {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1 1 0;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.82);
      color: #dbeafe;
      padding: 9px 10px;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover {
      background: rgba(30, 41, 59, 0.92);
    }
    .debug-panel {
      display: none;
      left: 24px;
      bottom: 24px;
      width: min(390px, calc(100vw - 48px));
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.84);
      padding: 12px;
    }
    pre {
      margin: 0;
      max-height: 38vh;
      overflow: auto;
      color: #d1fae5;
      font-size: 11px;
      line-height: 1.45;
    }
    html[data-debug="true"] .debug-panel {
      display: block;
    }
    #basemap-capture {
      position: fixed;
      left: -1200px;
      top: 0;
      width: 1024px;
      height: 1024px;
      opacity: 0;
      pointer-events: none;
    }
    @media (max-width: 900px) {
      .topbar {
        left: 12px;
        right: 12px;
        top: 12px;
        align-items: flex-start;
      }
      p {
        display: none;
      }
      .controls {
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <canvas id="terrain-3d-canvas" aria-label="3D flood terrain canvas"></canvas>
    <header class="topbar">
      <div class="brand">
        <h1>FloodMap 3D</h1>
        <p>Real streets and terrain, raised into a playable flood view.</p>
      </div>
      <div id="terrain-status" class="status">Booting</div>
    </header>
    <section class="controls" aria-label="3D terrain controls">
      <label for="water-level">
        <span>Water</span>
        <span id="water-readout">20m</span>
      </label>
      <input id="water-level" type="range" min="0" max="1000" step="1" value="22">
      <div class="readout"><span>low</span><span>high</span></div>

      <label for="exaggeration">
        <span>Terrain</span>
        <span id="exaggeration-readout">2.2x</span>
      </label>
      <input id="exaggeration" type="range" min="0.4" max="5" step="0.1" value="2">
      <div class="button-row">
        <button type="button" data-water-preset="8">Creeks</button>
        <button type="button" data-water-preset="35">Flood</button>
        <button type="button" id="reset-camera">Reset</button>
      </div>
    </section>
    <section class="debug-panel" aria-label="3D debug stats">
      <pre id="terrain-stats">{}</pre>
    </section>
    <div id="basemap-capture"></div>
  </main>
  <script>
    (() => {
      document.documentElement.dataset.debug = new URLSearchParams(location.search).get("debug") === "1"
        ? "true"
        : "false";
      window.FLOODMAP_ASSET_VERSION = "__FLOODMAP_ASSET_VERSION__";
      window.FLOODMAP_PUBLIC_BASE_PATH = (function determineFloodmapPublicBasePath() {
        const pathname = window.location.pathname || "/";
        return pathname === "/floodmap" || pathname.startsWith("/floodmap/") ? "/floodmap" : "";
      })();
      function normalizeFloodmapPath(path) {
        if (typeof path !== "string" || !path.trim()) {
          throw new TypeError("Floodmap path helpers require a non-empty string path.");
        }
        return path.startsWith("/") ? path : `/${path}`;
      }
      window.floodmapPublicUrl = (path) => `${window.FLOODMAP_PUBLIC_BASE_PATH}${normalizeFloodmapPath(path)}`;
      window.floodmapApiUrl = (path) => {
        const normalizedPath = normalizeFloodmapPath(path);
        const apiPath = normalizedPath === "/api" || normalizedPath.startsWith("/api/")
          ? normalizedPath
          : `/api${normalizedPath}`;
        return window.floodmapPublicUrl(apiPath);
      };
      window.floodmapAssetUrl = (path) => {
        const normalizedPath = normalizeFloodmapPath(path);
        const staticPath = normalizedPath === "/static" || normalizedPath.startsWith("/static/")
          ? normalizedPath
          : `/static${normalizedPath}`;
        const url = new URL(window.floodmapPublicUrl(staticPath), window.location.origin);
        if (window.FLOODMAP_ASSET_VERSION) url.searchParams.set("v", window.FLOODMAP_ASSET_VERSION);
        return url.toString();
      };
      window.FLOODMAP_TILE_VERSION = window.FLOODMAP_ASSET_VERSION;
    })();
  </script>
  <script src="static/vendor/maplibre-gl-csp-4.7.1.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script>
    maplibregl.setWorkerUrl(window.floodmapAssetUrl("/vendor/maplibre-gl-csp-worker-4.7.1.js"));
  </script>
  <script src="static/js/elevation-renderer.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-math.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-shaders.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-basemap.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d-mesh.js?v=__FLOODMAP_ASSET_VERSION__"></script>
  <script src="static/js/terrain-3d.js?v=__FLOODMAP_ASSET_VERSION__"></script>
</body>
</html>
